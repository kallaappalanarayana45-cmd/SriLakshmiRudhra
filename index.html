<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sri Lakshmi Rudhra Car Booking</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background: #f4f4f4;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: white;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: green;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: darkgreen;
    }

    #price {
      font-weight: bold;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<header>
  <h1>Sri Lakshmi Rudhra Car Booking Service 🚗</h1>
  <p>Fast & Easy Ride Booking</p>
</header>

<div class="container">

  <div class="card">
    <h2>Book Your Ride</h2>

    <input type="text" id="name" placeholder="Your Name" required>
    <input type="text" id="phone" placeholder="Phone Number" required>
    <input type="text" id="pickup" placeholder="Pickup Location" required>
    <input type="text" id="drop" placeholder="Drop Location" required>
    <input type="number" id="km" placeholder="Distance (KM)" required oninput="calculatePrice()">

    <p id="price">Estimated Price: ₹0</p>

    <button onclick="bookNow()">💳 Pay & Book Now</button>
  </div>

  <div class="card">
    <h2>Available Cars</h2>
    <ul>
      <li>🚗 Swift Dzire</li>
      <li>🚙 Innova</li>
      <li>🚘 Hyundai i20</li>
    </ul>
  </div>

</div>

<script>

function calculatePrice() {
  let km = document.getElementById("km").value;
  let price = km * 12;
  document.getElementById("price").innerText = "Estimated Price: ₹" + price;
}

function bookNow() {
  let name = document.getElementById("name").value;
  let phone = document.getElementById("phone").value;
  let pickup = document.getElementById("pickup").value;
  let drop = document.getElementById("drop").value;
  let km = document.getElementById("km").value;
  let price = km * 12;

  if (!name || !phone || !pickup || !drop || !km) {
    alert("Please fill all details");
    return;
  }

  // UPI Payment Link (CHANGE YOUR UPI ID HERE)
  let upi = "upi://pay?pa=9000728081@upi&pn=SriLakshmiRudhra&am=" 
            + price + "&cu=INR";

  window.location.href = upi;
}

</script>

</body>
</html>
